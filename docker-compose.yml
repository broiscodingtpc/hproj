version: '3.8'

# Treasury Agent — local development stack.
# Run: docker-compose up
# Then open http://localhost:5173 for the frontend.

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: treasury_agent
      POSTGRES_USER: treasury
      POSTGRES_PASSWORD: treasury_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treasury"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml:
    build: ./ml
    ports:
      - "5000:5000"
    environment:
      ML_PORT: 5000
      ENV: development
      MODEL_PATH: /app/models/q_table.pkl
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://treasury:treasury_dev_pass@postgres:5432/treasury_agent
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ml:5000
      JWT_SECRET: dev_secret_replace_in_production_32_chars_min
      SOLANA_NETWORK: devnet
      SOLANA_RPC_URL: https://api.devnet.solana.com
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  ml_models:
