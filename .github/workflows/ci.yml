name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ml-tests:
    name: ML Router Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements.txt
      - name: Install dependencies
        run: pip install -r ml/requirements.txt
      - name: Run tests
        working-directory: ml
        run: python tests/test_router.py

  backend-lint:
    name: Backend TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install
        working-directory: backend
        run: npm install
      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit || true   # warn only until full DB layer wired

  visualizer-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: treasury-visualizer/package-lock.json
      - name: Install
        working-directory: treasury-visualizer
        run: npm ci
      - name: Build
        working-directory: treasury-visualizer
        run: npm run build
