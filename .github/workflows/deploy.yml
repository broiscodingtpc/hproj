name: Deploy Treasury Visualizer to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'treasury-visualizer/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: treasury-visualizer/package-lock.json

      - name: Install dependencies
        working-directory: treasury-visualizer
        run: npm ci

      - name: Build
        working-directory: treasury-visualizer
        run: npm run build
        env:
          VITE_BASE_URL: /hproj/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: treasury-visualizer/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
